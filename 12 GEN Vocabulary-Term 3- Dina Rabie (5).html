// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let activeLessonId = 1;
let activeWordIdx = null;
let quizState = {}; // { lessonId: { qIdx: { chosen, correct } } }

function getLesson() { return lessons.find(l => l.id === activeLessonId); }

// ─────────────────────────────────────────────
// SOUNDS (Web Audio API)
// ─────────────────────────────────────────────
function playCorrectSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.35, now + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.25);
      osc.start(now + i * 0.12);
      osc.stop(now + i * 0.12 + 0.25);
    });
  } catch(e) {}
}

function playWrongSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    [220, 196].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, now + i * 0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 0.22);
      osc.start(now + i * 0.18);
      osc.stop(now + i * 0.18 + 0.22);
    });
  } catch(e) {}
}


function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  window.speechSynthesis.speak(utter);
}

// ─────────────────────────────────────────────
// SCORE
// ─────────────────────────────────────────────
function getScore(lessonId) {
  const q = quizState[lessonId] || {};
  const correct = Object.values(q).filter(v => v.correct).length;
  const answered = Object.values(q).length;
  return { correct, answered, total: lessons.find(l=>l.id===lessonId).mcqs.length };
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderLessonNav() {
  const nav = document.getElementById('lessonNav');
  nav.innerHTML = lessons.map(l => `
    <button class="lesson-btn ${l.id===1?'l1':'l2'} ${activeLessonId===l.id?'active':''}"
      onclick="selectLesson(${l.id})">
      <div class="lesson-num">Lesson ${l.id}</div>
      <div class="lesson-title">${l.title}</div>
      <div class="lesson-sub">${l.sub}</div>
    </button>
  `).join('');
}

function renderWordCard() {
  const lesson = getLesson();
  if (activeWordIdx === null) return '';
  const w = lesson.words[activeWordIdx];
  return `
    <div class="word-card" style="border-left-color:${lesson.color}">
      <div>
        <span class="wc-word" style="color:${lesson.color}">${w.word}</span>
        <span class="wc-pos">${w.pos}</span>
      </div>
      <div class="wc-row">
        <div class="wc-block">
          <div class="wc-label">English Meaning</div>
          <div class="wc-meaning">${w.en}</div>
        </div>
        <div class="wc-block">
          <div class="wc-label" style="text-align:right">المعنى بالعربية</div>
          <div class="wc-arabic">${w.ar}</div>
        </div>
      </div>
      <hr class="wc-divider">
      <div class="wc-label">Example Sentence</div>
      <div class="wc-example">${w.ex}</div>
      <div class="wc-ex-ar">${w.exAr}</div>
      <button class="play-btn" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊 Listen Again</button>
    </div>
  `;
}

function renderMCQs() {
  const lesson = getLesson();
  const sc = getScore(lesson.id);
  const stateQ = quizState[lesson.id] || {};
  const mcqsHTML = lesson.mcqs.map((q, qi) => {
    const answered = stateQ[qi];
    const opts = q.opts.map((o, oi) => {
      let cls = 'mcq-opt';
      if (answered) {
        cls += ' answered';
        if (oi === q.ans) cls += ' correct';
        else if (oi === answered.chosen) cls += ' wrong';
      }
      return `<button class="${cls}" onclick="answerMCQ(${qi},${oi})">${o}</button>`;
    }).join('');
    const feedback = answered
      ? (answered.correct
          ? `<div class="mcq-feedback ok">✅ Correct!</div>`
          : `<div class="mcq-feedback no">❌ The correct answer is: <strong>${q.opts[q.ans]}</strong></div>`)
      : '';
    return `
      <div class="mcq-card">
        <div class="mcq-q">${qi+1}. ${q.q.replace('___','<em>___</em>')}</div>
        <div class="mcq-options">${opts}</div>
        ${feedback}
      </div>
    `;
  }).join('');

  return `
    <hr class="section-sep">
    <div class="mcq-header">
      <div class="mcq-title">✏️ Practice: Choose the best word.</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="score-box">Score: ${sc.correct} / ${sc.answered} answered</div>
        <button class="reset-btn" onclick="resetQuiz(${lesson.id})">🔄 Reset Quiz</button>
      </div>
    </div>
    ${mcqsHTML}
  `;
}

function renderMain() {
  const lesson = getLesson();
  const chipsHTML = lesson.words.map((w, i) => `
    <button class="word-chip ${activeWordIdx===i?'active':''}"
      onclick="selectWord(${i})">
      <span class="sound-icon">🔊</span> ${w.word}
    </button>
  `).join('');

  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="${lesson.theme}">
      <p class="instruction">👆 Click a word to listen and learn its meaning.</p>
      <div class="word-grid">${chipsHTML}</div>
      ${renderWordCard()}
      ${renderMCQs()}
    </div>
  `;
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function selectLesson(id) {
  activeLessonId = id;
  activeWordIdx = null;
  renderLessonNav();
  renderMain();
}

function selectWord(idx) {
  activeWordIdx = idx;
  const lesson = getLesson();
  speak(lesson.words[idx].word);
  renderMain();
  // scroll word card into view
  setTimeout(() => {
    const card = document.querySelector('.word-card');
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function answerMCQ(qi, oi) {
  const lesson = getLesson();
  if (!quizState[lesson.id]) quizState[lesson.id] = {};
  if (quizState[lesson.id][qi]) return; // already answered
  const isCorrect = oi === lesson.mcqs[qi].ans;
  quizState[lesson.id][qi] = { chosen: oi, correct: isCorrect };
  if (isCorrect) playCorrectSound(); else playWrongSound();
  renderMain();
  // Check if all answered → show summary feedback
  const total = lesson.mcqs.length;
  const answered = Object.keys(quizState[lesson.id]).length;
  if (answered === total) {
    setTimeout(() => showFinalFeedback(lesson.id), 350);
  }
}

function showFinalFeedback(lessonId) {
  const sc = getScore(lessonId);
  const pct = Math.round((sc.correct / sc.total) * 100);
  let emoji, msg, color;
  if (pct === 100) { emoji = '🏆'; msg = 'Perfect score! Outstanding work!'; color = '#16a34a'; }
  else if (pct >= 80) { emoji = '🌟'; msg = 'Excellent! Keep it up!'; color = '#0284c7'; }
  else if (pct >= 60) { emoji = '👍'; msg = 'Good effort! Review the missed words.'; color = '#d97706'; }
  else { emoji = '📚'; msg = 'Keep practising — you\'ll get there!'; color = '#dc2626'; }

  const existing = document.getElementById('finalFeedback');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'finalFeedback';
  div.style.cssText = `
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#fff; border:3px solid ${color}; border-radius:16px;
    padding:18px 28px; box-shadow:0 8px 32px rgba(0,0,0,0.18);
    text-align:center; z-index:1000; min-width:280px; max-width:90vw;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  `;
  div.innerHTML = `
    <div style="font-size:2rem">${emoji}</div>
    <div style="font-size:1.1rem;font-weight:900;color:${color};margin:6px 0">${sc.correct} / ${sc.total} Correct (${pct}%)</div>
    <div style="font-size:0.9rem;color:#475569;font-weight:600">${msg}</div>
    <button onclick="this.parentElement.remove()" style="margin-top:12px;padding:6px 20px;border:none;border-radius:30px;background:${color};color:white;font-family:Nunito,sans-serif;font-weight:700;cursor:pointer;font-size:0.85rem">Close</button>
  `;
  document.body.appendChild(div);
}

function resetQuiz(lessonId) {
  quizState[lessonId] = {};
  const fb = document.getElementById('finalFeedback');
  if (fb) fb.remove();
  renderMain();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderLessonNav();
renderMain();

  const threshold = 160;
  function check() {
    if (window.outerWidth - window.innerWidth > threshold ||
        window.outerHeight - window.innerHeight > threshold) {
      document.getElementById('shield').style.display = 'flex';
    } else {
      document.getElementById('shield').style.display = 'none';
    }
  }
  window.addEventListener('resize', check);
  setInterval(check, 1000);
})();
